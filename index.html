function Icon({name,size=20,stroke=1.7}){
  const p={width:size,height:size,viewBox:"0 0 24 24",fill:"none",stroke:"currentColor",strokeWidth:stroke,strokeLinecap:"round",strokeLinejoin:"round"};
  const paths={
    chevron:<polyline points="6 9 12 15 18 9"/>,
    arrow:<><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></>,
    left:<polyline points="15 18 9 12 15 6"/>,
    right:<polyline points="9 18 15 12 9 6"/>,
    check:<polyline points="20 6 9 17 4 12"/>,
    database:<><ellipse cx="12" cy="5" rx="8" ry="3"/><path d="M4 5v6c0 1.7 3.6 3 8 3s8-1.3 8-3V5"/><path d="M4 11v6c0 1.7 3.6 3 8 3s8-1.3 8-3v-6"/></>,
    shield:<><path d="M12 3l7 3v5c0 4.5-3 7.5-7 9-4-1.5-7-4.5-7-9V6z"/><polyline points="9 12 11 14 15 10"/></>,
    leaf:<><path d="M11 20A7 7 0 0 1 4 13c0-5 5-9 16-9 0 7-3 16-9 16z"/><line x1="6" y1="18" x2="14" y2="10"/></>,
    menu:<><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></>,
  };
  return <svg {...p} aria-hidden="true">{paths[name]}</svg>;
}

/* ── Hero ── */
const SLIDES=[
  {eye:"LTO Tape Backup · 2025",title:<>Built for your <span className="accent">long-term archive.</span></>,sub:"LTO tape delivers the lowest cost per terabyte in storage — open, interchangeable, and ready for data you need to keep for decades. Air-gapped and offline by design.",p1:"Why Choose Tape",h1:"/why-tape",p2:"View LTO Prices",h2:"/lto-tape-price-trend"},
  {eye:"Security",title:<>Air-gapped. <span className="accent">Ransomware-proof.</span></>,sub:"An offline LTO cartridge is completely invisible to ransomware. Hardware AES-256 encryption and WORM media give you a last line of defense that simply cannot be reached over a network.",p1:"How Air-Gap Works",h1:"/why-tape",p2:"WORM & Encryption",h2:"/tape-q-and-a"},
  {eye:"Economics",title:<>The lowest cost <span className="accent">per terabyte.</span></>,sub:"Idle tape draws zero power and scales by adding cartridges — not arrays. LTO-9 delivers ~$5/TB native. For cold archive and long-term retention, nothing else comes close on TCO.",p1:"See LTO-9 Pricing",h1:"/lto-tape-price-trend/lto9-price",p2:"Compare Generations",h2:"/lto-tape-price-trend"},
];

function Hero(){
  const [i,setI]=React.useState(0);
  const [paused,setPaused]=React.useState(false);
  const go=n=>setI((n+SLIDES.length)%SLIDES.length);
  React.useEffect(()=>{
    if(paused)return;
    const t=setInterval(()=>setI(v=>(v+1)%SLIDES.length),6500);
    return ()=>clearInterval(t);
  },[paused]);
  const s=SLIDES[i];
  return (
    <section className="hero" onMouseEnter={()=>setPaused(true)} onMouseLeave={()=>setPaused(false)}>
      <div className="wrap">
        <div className="hero-grid">
          <div className="hero-copy">
            <div className="slide-fade" key={"c"+i}>
              <span className="eyebrow"><span className="dot"/>{s.eye}</span>
              <h1>{s.title}</h1>
              <p className="hero-sub">{s.sub}</p>
              <div className="hero-cta">
                <a className="btn btn-primary" href={s.h1}>{s.p1}<span className="arr"><Icon name="arrow" size={18}/></span></a>
                <a className="btn btn-ghost" href={s.h2}>{s.p2}</a>
              </div>
            </div>
            <div className="hero-controls">
              <div className="dots">
                {SLIDES.map((_,n)=><button key={n} className={"dot-btn"+(n===i?" on":"")} onClick={()=>go(n)} aria-label={"Slide "+(n+1)}/>)}
              </div>
              <div className="arrows">
                <button className="arrow" onClick={()=>go(i-1)} aria-label="Previous"><Icon name="left" size={18}/></button>
                <button className="arrow" onClick={()=>go(i+1)} aria-label="Next"><Icon name="right" size={18}/></button>
              </div>
              <span className="slide-count"><b>{String(i+1).padStart(2,"0")}</b> / {String(SLIDES.length).padStart(2,"0")}</span>
            </div>
          </div>
          <Cartridge/>
        </div>
      </div>
    </section>
  );
}

          <div className="rm-nodes">

          <span><i style={{background:"var(--line-2)"}}/> On the roadmap</span>
        </div>
      </div>
    </section>
  );
}
